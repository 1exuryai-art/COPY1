<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MONARCH — Panel treści</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body class="dogma-admin-shell">
  <div id="loginView" class="dogma-login">
    <h2>MONARCH</h2>
    <p class="dogma-hint" style="margin:0 0 8px">Zaloguj się, żeby zmieniać treści na stronie.</p>
    <label for="loginUser">Login</label>
    <input id="loginUser" type="text" autocomplete="username" />
    <label for="loginPass">Hasło</label>
    <input id="loginPass" type="password" autocomplete="current-password" />
    <button type="button" class="dogma-btn dogma-btn--primary" id="loginBtn">Zaloguj</button>
    <p class="dogma-status" id="loginStatus" aria-live="polite"></p>
  </div>

  <div id="appView" class="dogma-admin admin-app hidden">
    <header class="dogma-admin__head">
      <div>
        <h1>Panel treści — MONARCH</h1>
        <p>Dodajesz zdjęcia i teksty — zapisujesz — klienci to widzą na stronie.</p>
      </div>
      <div class="dogma-admin__actions">
        <span class="dogma-dirty-banner" id="dirtyBanner" aria-live="polite"></span>
        <span class="dogma-status" id="saveStatus" aria-live="polite"></span>
        <button type="button" class="dogma-btn dogma-btn--primary dogma-btn--save" id="saveBtn">Zapisz zmiany</button>
        <button type="button" class="dogma-btn dogma-btn--ghost" id="logoutBtn">Wyloguj</button>
      </div>
    </header>

    <nav class="dogma-tabs" id="tabNav" aria-label="Sekcje"></nav>

    <section class="dogma-panel" data-panel="works" id="panel-works"></section>
    <section class="dogma-panel" data-panel="effect" id="panel-effect"></section>
    <section class="dogma-panel" data-panel="salon" id="panel-salon"></section>
    <section class="dogma-panel" data-panel="barbers" id="panel-barbers"></section>
    <section class="dogma-panel" data-panel="services" id="panel-services"></section>
    <section class="dogma-panel" data-panel="booking" id="panel-booking"></section>
    <section class="dogma-panel" data-panel="contacts" id="panel-contacts"></section>

    <div class="dogma-save-bar" aria-hidden="false">
      <button type="button" class="dogma-btn dogma-btn--primary dogma-btn--block-sm" id="saveBtnSticky">Zapisz zmiany</button>
    </div>
  </div>

  <script type="module" src="/admin/admin.js"></script>
</body>
</html>
